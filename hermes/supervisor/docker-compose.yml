services:
  hermes-supervisor:
    image: nousresearch/hermes-agent:latest
    container_name: ${HERMES_SUPERVISOR_CONTAINER_NAME:-hermes-supervisor}
    restart: unless-stopped
    command: gateway run
    shm_size: ${HERMES_SUPERVISOR_SHM_SIZE:-1gb}
    ports:
      - "${HERMES_SUPERVISOR_API_PORT:-8642}:8642"
      - "${HERMES_SUPERVISOR_DASHBOARD_PORT:-9119}:9119"
      - "${HERMES_SUPERVISOR_LINE_PORT:-8647}:${LINE_PORT:-8646}"
    volumes:
      - ${HERMES_SUPERVISOR_RUNTIME_DIR:-./runtime}:/opt/data
    environment:
      HERMES_DASHBOARD: ${HERMES_DASHBOARD:-1}
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: ${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: ${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      HERMES_DASHBOARD_BASIC_AUTH_SECRET: ${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
      API_SERVER_ENABLED: ${API_SERVER_ENABLED:-false}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      API_SERVER_KEY: ${API_SERVER_KEY:-change-this-api-key}
      API_SERVER_CORS_ORIGINS: ${API_SERVER_CORS_ORIGINS:-*}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-replace-with-line-channel-access-token}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-replace-with-line-channel-secret}
      LINE_HOST: ${LINE_HOST:-0.0.0.0}
      LINE_PORT: ${LINE_PORT:-8646}
      LINE_PUBLIC_URL: ${LINE_PUBLIC_URL:-https://replace-with-public-line-url}
      LINE_ALLOWED_USERS: ${LINE_ALLOWED_USERS:-}
      LINE_ALLOWED_GROUPS: ${LINE_ALLOWED_GROUPS:-}
      LINE_ALLOWED_ROOMS: ${LINE_ALLOWED_ROOMS:-}
      LINE_ALLOW_ALL_USERS: ${LINE_ALLOW_ALL_USERS:-false}
      LINE_HOME_CHANNEL: ${LINE_HOME_CHANNEL:-}
      LINE_SLOW_RESPONSE_THRESHOLD: ${LINE_SLOW_RESPONSE_THRESHOLD:-45}

  ocr-worker:
    build:
      context: ../..
      dockerfile: hermes/ocr_worker/Dockerfile
    image: supervisor-ocr-worker:latest
    container_name: ${OCR_WORKER_CONTAINER_NAME:-ocr-worker}
    restart: unless-stopped
    command: python -m hermes.ocr_worker
    depends_on:
      hermes-supervisor:
        condition: service_started
    volumes:
      - ${USERPROFILE}/.aws:/root/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-personal_hermes}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-replace-with-line-channel-access-token}
      OCR_WORKER_HERMES_BASE_URL: ${OCR_WORKER_HERMES_BASE_URL:-http://hermes-supervisor:8642}
      OCR_WORKER_HERMES_API_KEY: ${OCR_WORKER_HERMES_API_KEY:-change-this-api-key}
      OCR_WORKER_HERMES_MODEL: ${OCR_WORKER_HERMES_MODEL:-hermes-agent}
      OCR_WORKER_QUEUE_URL: ${OCR_WORKER_QUEUE_URL:-}
      OCR_WORKER_AWS_REGION: ${OCR_WORKER_AWS_REGION:-ap-southeast-1}
      OCR_WORKER_S3_BUCKET: ${OCR_WORKER_S3_BUCKET:-}
      OCR_WORKER_S3_PREFIX: ${OCR_WORKER_S3_PREFIX:-}
      OCR_WORKER_QUEUE_VISIBILITY_TIMEOUT: ${OCR_WORKER_QUEUE_VISIBILITY_TIMEOUT:-300}
      OCR_WORKER_MODEL_NAME: ${OCR_WORKER_MODEL_NAME:-gemma4:26b}

  line-relay:
    build:
      context: ../..
      dockerfile: hermes/supervisor/Dockerfile.relay
    image: supervisor-line-relay:latest
    container_name: ${LINE_RELAY_CONTAINER_NAME:-line-relay}
    restart: unless-stopped
    command: python -m hermes.supervisor.line_webhook_relay --host 0.0.0.0 --port 8646 --upstream-base-url http://hermes-supervisor:${LINE_PORT:-8646}
    depends_on:
      hermes-supervisor:
        condition: service_started
    ports:
      - "${LINE_PORT:-8646}:8646"
    volumes:
      - ${USERPROFILE}/.aws:/root/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-personal_hermes}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-replace-with-line-channel-access-token}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-replace-with-line-channel-secret}
      LINE_LIFF_CORRECTION_ID: ${LINE_LIFF_CORRECTION_ID:-}
      SUPERVISOR_STORAGE_BACKEND: ${SUPERVISOR_STORAGE_BACKEND:-s3}
      SUPERVISOR_S3_BUCKET: ${SUPERVISOR_S3_BUCKET:-}
      SUPERVISOR_S3_REGION: ${SUPERVISOR_S3_REGION:-}
      SUPERVISOR_S3_PREFIX: ${SUPERVISOR_S3_PREFIX:-}
      SUPERVISOR_OCR_QUEUE_URL: ${SUPERVISOR_OCR_QUEUE_URL:-}

  update-worker:
    profiles:
      - update-worker
    build:
      context: ../..
      dockerfile: hermes/update_worker/Dockerfile
    image: supervisor-update-worker:latest
    container_name: ${UPDATE_WORKER_CONTAINER_NAME:-update-worker}
    restart: "no"
    command: python -m hermes.update_worker
    volumes:
      - ${USERPROFILE}/.aws:/root/.aws:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-personal_hermes}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-southeast-1}
      UPDATE_WORKER_QUEUE_URL: ${UPDATE_WORKER_QUEUE_URL:-}
      UPDATE_WORKER_AWS_REGION: ${UPDATE_WORKER_AWS_REGION:-ap-southeast-1}
      UPDATE_WORKER_S3_BUCKET: ${UPDATE_WORKER_S3_BUCKET:-}
      UPDATE_WORKER_S3_PREFIX: ${UPDATE_WORKER_S3_PREFIX:-}
      UPDATE_WORKER_TARGET_API_BASE_URL: ${UPDATE_WORKER_TARGET_API_BASE_URL:-}
      UPDATE_WORKER_QUEUE_VISIBILITY_TIMEOUT: ${UPDATE_WORKER_QUEUE_VISIBILITY_TIMEOUT:-300}
