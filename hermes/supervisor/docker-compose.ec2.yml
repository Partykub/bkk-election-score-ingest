services:
  hermes-supervisor:
    extends:
      file: ./docker-compose.yml
      service: hermes-supervisor

  ocr-worker:
    extends:
      file: ./docker-compose.yml
      service: ocr-worker
    depends_on:
      hermes-supervisor:
        condition: service_started

  update-worker:
    extends:
      file: ./docker-compose.yml
      service: update-worker

  line-relay:
    extends:
      file: ./docker-compose.yml
      service: line-relay
    depends_on:
      hermes-supervisor:
        condition: service_started
